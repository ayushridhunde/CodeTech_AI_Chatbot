<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayushri Professional AI</title>
    <style>
        /* Professional Theme */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 450px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .chat-header { background: #2c3e50; color: white; padding: 20px; text-align: center; font-size: 1.2em; font-weight: 600; }
        #chat-box { height: 450px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .user-message { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background: #ecf0f1; color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 20px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #2c3e50; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #34495e; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Ayushri's Smart AI Support</div>
    <div id="chat-box">
        </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about Blockchain, ECG, or Machine Learning...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const message = inputField.value.trim();

        if (!message) return;

        // User ka message dikhao
        chatBox.innerHTML += `<div class="message user-message">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Backend (app.py) ko data bhejo
            const response = await fetch('/get_response', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            // Bot ka reply dikhao
            chatBox.innerHTML += `<div class="message bot-message">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.error("Error:", error);
        }
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
